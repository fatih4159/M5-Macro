; PlatformIO project configuration for m5Macro.
; The sketch stays in the repository root so Arduino IDE can still open
; M5-Macro.ino directly.

[platformio]
default_envs = m5dial
src_dir = .
include_dir = .

[env:m5dial]
platform = espressif32
board = m5stack-stamps3
framework = arduino

build_src_filter =
    +<*.ino>
    +<*.cpp>
    +<*.h>
    -<.arduino-build-*/>
    -<.claude/>
    -<.git/>
    -<.github/>
    -<.pio/>
    -<build/>
    -<build-*/>
    -<tmp/>
    -<temp/>

upload_speed = 921600
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.flash_size = 8MB
board_upload.flash_size = 8MB

build_flags =
    -I .
    -DLV_CONF_INCLUDE_SIMPLE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    m5stack/M5Dial@^1.0.3
    m5stack/M5Unified@^0.2.6
    m5stack/M5GFX@^0.2.4
    lvgl/lvgl@^9.2.0
    bitbank2/AnimatedGIF@^2.2.0
    https://github.com/T-vK/ESP32-BLE-Keyboard.git#0.3.2-beta

lib_ldf_mode = deep+
